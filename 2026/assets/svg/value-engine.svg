    <line x1="700" y1="145" x2="700" y2="300"/>

    <line x1="700" y1="600" x2="700" y2="760"/>

    <line x1="355" y1="450" x2="515" y2="450"/>

    <line x1="885" y1="450" x2="1045" y2="450"/>

</g>

