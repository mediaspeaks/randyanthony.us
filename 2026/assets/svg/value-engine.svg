        y1="720"
        x2="1170"
        y2="805"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

    <circle
        cx="1170"
        cy="835"
        r="42"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

    <text
        x="1170"
        y="828"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="13"
        font-weight="700">

        LONG-TERM

    </text>

    <text
        x="1170"
        y="846"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="13"
        font-weight="700">

        VALUE

    </text>

</g>
<!-- =====================================================
     ENGINE STATUS RING
===================================================== -->

<g id="engine-status">

    <circle
        cx="700"
        cy="450"
        r="118"
        fill="none"
        stroke="#F6E7A8"
        stroke-width="1"
        opacity=".10"/>

    <circle
        cx="700"
        cy="450"
        r="138"
        fill="none"
        stroke="#F6E7A8"
        stroke-width="1"
        opacity=".05"/>

    <circle
        cx="700"
        cy="450"
        r="158"
        fill="none"
        stroke="#F6E7A8"
        stroke-width="1"
        opacity=".03"/>

</g>

<!-- =====================================================
     FLOW LABELS
===================================================== -->

<g
    fill="#D5DCE5"
    font-family="Inter,Arial,sans-serif"
    font-size="14"
    letter-spacing="1.5">

    <text
        x="430"
        y="160"
        text-anchor="middle">

        INPUTS

    </text>

    <text
        x="970"
        y="160"
        text-anchor="middle">

        OUTPUTS

    </text>

    <text
        x="700"
        y="615"
        text-anchor="middle"
        fill="#E0C468"
        font-weight="700">

        VALUE CREATION PROCESS

    </text>

</g>

