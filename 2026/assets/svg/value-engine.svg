        VALUE ENGINE ONLINE

    </text>

</g>

<!-- =====================================================
     FOOTER
===================================================== -->

<g id="footer">

    <line

        x1="220"
        y1="865"

        x2="1180"
        y2="865"

        stroke="#223041"

        stroke-width="2"/>

    <text

        x="700"
        y="890"

        text-anchor="middle"

        fill="#667789"

        font-family="Inter,Arial,sans-serif"

        font-size="13"

        letter-spacing="2">

        THE PIETY PAYCHAIN • VALUE ENGINE • VERSION 1.0

    </text>

</g>
