<?xml version="1.0" encoding="UTF-8"?>
<!--
=============================================================
 The Piety PayChain
 Value Engine
 Version 1.0
 Part 1 - Foundation
=============================================================
-->

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1400"
    height="900"
    viewBox="0 0 1400 900"
    role="img"
    aria-labelledby="title desc">

<title id="title">
The Piety PayChain Value Engine
</title>

<desc id="desc">
Illustration showing how payroll enters the Asset Fusion
Engine and produces long-term value.
</desc>

<defs>

    <linearGradient
        id="goldGradient"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="100%">

        <stop offset="0%" stop-color="#F7E4A4"/>
        <stop offset="45%" stop-color="#DFC061"/>
        <stop offset="100%" stop-color="#B88723"/>

    </linearGradient>

    <linearGradient
        id="panelGradient"
        x1="0%"
        y1="0%"
        x2="0%"
        y2="100%">

        <stop offset="0%" stop-color="#162335"/>
        <stop offset="100%" stop-color="#08111D"/>

    </linearGradient>

    <filter id="goldGlow">

        <feGaussianBlur
            stdDeviation="10"
            result="blur"/>

        <feMerge>

            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>

        </feMerge>

    </filter>

</defs>

<rect

    width="1400"
    height="900"

    fill="#05080D"/>

<!-- =====================================================
     ENGINE TITLE
===================================================== -->

<text

    x="700"
    y="90"

    text-anchor="middle"

    fill="#F6E7A8"

    font-family="Inter,Arial,sans-serif"

    font-size="34"

    font-weight="700"

    letter-spacing="4">

THE VALUE ENGINE

</text>

<text

    x="700"
    y="125"

    text-anchor="middle"

    fill="#96A5B7"

    font-family="Inter,Arial,sans-serif"

    font-size="18"

    letter-spacing="2">

TRANSFORMING PAYROLL INTO LONG-TERM VALUE

</text>

<!-- =====================================================
     CENTER ENGINE
===================================================== -->

<g id="engine">

<rect

    x="515"
    y="315"

    width="370"
    height="270"

    rx="24"

    fill="url(#panelGradient)"

    stroke="url(#goldGradient)"

    stroke-width="4"

    filter="url(#goldGlow)"/>

<circle

    cx="700"

    cy="450"

    r="78"

    fill="none"

    stroke="url(#goldGradient)"

    stroke-width="3"/>

<circle

    cx="700"

    cy="450"

    r="42"

    fill="url(#goldGradient)"/>

<text

    x="700"

    y="435"

    text-anchor="middle"

    fill="#FFFFFF"

    font-size="20"

    font-family="Inter,Arial,sans-serif"

    font-weight="700">

ASSET

</text>

<text

    x="700"

    y="470"

    text-anchor="middle"

    fill="#FFFFFF"

    font-size="20"

    font-family="Inter,Arial,sans-serif"

    font-weight="700">

FUSION

</text>

</g>
<!-- =====================================================
     INPUT STREAMS
===================================================== -->

<g id="inputs">

    <!-- PAYROLL -->

    <rect
        x="120"
        y="180"
        width="220"
        height="60"
        rx="10"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <text
        x="230"
        y="217"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        PAYROLL

    </text>

    <line
        x1="340"
        y1="210"
        x2="515"
        y2="355"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

    <!-- PRIVATE LEDGER -->

    <rect
        x="120"
        y="330"
        width="220"
        height="60"
        rx="10"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <text
        x="230"
        y="367"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        PRIVATE LEDGER

    </text>

    <line
        x1="340"
        y1="360"
        x2="515"
        y2="415"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

    <!-- DIGITAL ASSETS -->

    <rect
        x="120"
        y="480"
        width="220"
        height="60"
        rx="10"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <text
        x="230"
        y="517"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        DIGITAL ASSETS

    </text>

    <line
        x1="340"
        y1="510"
        x2="515"
        y2="485"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

</g>

<!-- =====================================================
     FLOW DIRECTION
===================================================== -->

<g
    fill="#F6E7A8"
    opacity=".70">

    <polygon
        points="500,350 515,355 503,367"/>

    <polygon
        points="500,410 515,415 503,427"/>

    <polygon
        points="500,480 515,485 503,497"/>

</g>
<!-- =====================================================
     OUTPUT STREAMS
===================================================== -->

<g id="outputs">

    <!-- EMPLOYEES -->

    <line
        x1="885"
        y1="355"
        x2="1060"
        y2="210"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

    <rect
        x="1060"
        y="180"
        width="220"
        height="60"
        rx="10"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <text
        x="1170"
        y="217"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        EMPLOYEES

    </text>

    <!-- MERCHANTS -->

    <line
        x1="885"
        y1="450"
        x2="1060"
        y2="450"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

    <rect
        x="1060"
        y="420"
        width="220"
        height="60"
        rx="10"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <text
        x="1170"
        y="457"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        MERCHANTS

    </text>

    <!-- BUSINESS GROWTH -->

    <line
        x1="885"
        y1="545"
        x2="1060"
        y2="690"
        stroke="url(#goldGradient)"
        stroke-width="3"/>

    <rect
        x="1060"
        y="660"
        width="220"
        height="60"
        rx="10"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <text
        x="1170"
        y="697"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="17"
        font-weight="600">

        BUSINESS GROWTH

    </text>

</g>

<!-- =====================================================
     OUTPUT FLOW ARROWS
===================================================== -->

<g
    fill="#F6E7A8"
    opacity=".75">

    <polygon
        points="1046,206 1060,210 1048,222"/>

    <polygon
        points="1046,446 1060,450 1048,462"/>

    <polygon
        points="1046,686 1060,690 1048,702"/>

</g>

<!-- =====================================================
     VALUE CREATION PATH
===================================================== -->

<g id="value-path">

