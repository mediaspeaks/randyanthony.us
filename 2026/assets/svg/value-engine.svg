    <circle cx="405" cy="265" r="4"/>

    <circle cx="440" cy="320" r="4"/>

    <circle cx="458" cy="390" r="4"/>

    <circle cx="940" cy="365" r="4"/>

    <circle cx="960" cy="450" r="4"/>

    <circle cx="940" cy="535" r="4"/>

</g>

<!-- =====================================================
     ACTIVE STATUS
===================================================== -->

<g id="system-status">

    <circle
