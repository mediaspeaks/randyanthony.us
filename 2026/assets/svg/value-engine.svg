     FINAL VISUAL DETAILS
===================================================== -->

<g id="corner-markers"
   stroke="#304153"
   stroke-width="2"
   opacity=".30">

    <!-- Upper Left -->
    <line x1="40" y1="40" x2="90" y2="40"/>
    <line x1="40" y1="40" x2="40" y2="90"/>

    <!-- Upper Right -->
    <line x1="1310" y1="40" x2="1360" y2="40"/>
    <line x1="1360" y1="40" x2="1360" y2="90"/>

    <!-- Lower Left -->
    <line x1="40" y1="860" x2="90" y2="860"/>
    <line x1="40" y1="810" x2="40" y2="860"/>

    <!-- Lower Right -->
    <line x1="1310" y1="860" x2="1360" y2="860"/>
    <line x1="1360" y1="810" x2="1360" y2="860"/>

</g>

<!-- =====================================================
     GOLD HIGHLIGHT NODES
===================================================== -->

<g
    fill="url(#goldGradient)"
    opacity=".85">

    <circle cx="515" cy="355" r="5"/>
    <circle cx="515" cy="415" r="5"/>
    <circle cx="515" cy="485" r="5"/>

    <circle cx="885" cy="355" r="5"/>
    <circle cx="885" cy="450" r="5"/>
    <circle cx="885" cy="545" r="5"/>

</g>

<!-- =====================================================
     ENGINE CAPTION
===================================================== -->

<text
    x="700"
    y="675"
    text-anchor="middle"
    fill="#AAB5C3"
    font-family="Inter,Arial,sans-serif"
    font-size="15"
