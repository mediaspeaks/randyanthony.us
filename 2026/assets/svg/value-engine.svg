        cy="770"
        r="7"
        fill="#2ECC71"/>

    <text
        x="190"
        y="776"
        fill="#C6D0DC"
        font-family="Inter,Arial,sans-serif"
        font-size="14">

        SYSTEM ACTIVE

    </text>

    <circle
        cx="170"
        cy="800"
        r="7"
        fill="#3498DB"/>

    <text
        x="190"
        y="806"
        fill="#C6D0DC"
        font-family="Inter,Arial,sans-serif"
        font-size="14">

        PRIVATE LEDGER VERIFIED

    </text>

    <circle
        cx="170"
        cy="830"
        r="7"
        fill="#F1C40F"/>

    <text
        x="190"
        y="836"
        fill="#C6D0DC"
        font-family="Inter,Arial,sans-serif"
