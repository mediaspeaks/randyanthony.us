            y="498"
            text-anchor="middle"
            fill="#FFFFFF"
            font-size="14"
            font-family="Inter,Arial,sans-serif"
            font-weight="600">

            LEDGER

        </text>

    </g>

    <!-- DIGITAL ASSETS -->

    <g id="node-assets">

        <line
            x1="780"
            y1="640"
            x2="1010"
            y2="520"
            stroke="#C89B2F"
            stroke-width="2"
            opacity=".45"/>

        <circle
            cx="1070"
            cy="490"
            r="44"
            fill="url(#panelGradient)"
            stroke="url(#goldGradient)"
            stroke-width="3"
            filter="url(#nodeGlow)"/>

        <text
            x="1070"
            y="498"
            text-anchor="middle"
            fill="#FFFFFF"
            font-size="13"
            font-family="Inter,Arial,sans-serif"
            font-weight="600">

            ASSETS

        </text>

    </g>

</g>
