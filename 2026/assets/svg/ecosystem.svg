            y="258"
            text-anchor="middle"
            fill="#FFFFFF"
            font-size="16"
            font-family="Inter,Arial,sans-serif"
            font-weight="600">

            PAYROLL

        </text>

    </g>

    <!-- PRIVATE LEDGER -->

    <g id="node-ledger">

        <line
            x1="620"
            y1="640"
            x2="390"
            y2="520"
            stroke="#C89B2F"
            stroke-width="2"
            opacity=".45"/>

        <circle
            cx="330"
            cy="490"
            r="44"
            fill="url(#panelGradient)"
            stroke="url(#goldGradient)"
            stroke-width="3"
            filter="url(#nodeGlow)"/>

        <text
