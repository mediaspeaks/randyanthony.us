<?xml version="1.0" encoding="UTF-8"?>
<!--
=============================================================
 The Piety PayChain
 Ecosystem Diagram
 Version 1.0
 Part 1 - Foundation
=============================================================
-->

<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="1400"
    height="1400"
    viewBox="0 0 1400 1400"
    role="img"
    aria-labelledby="title desc">

<title id="title">
The Piety PayChain Ecosystem
</title>

<desc id="desc">
An engineering-style ecosystem diagram illustrating the
Asset Fusion Payroll System.
</desc>

<defs>

    <!-- Gold Gradient -->

    <linearGradient
        id="goldGradient"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="100%">

        <stop offset="0%" stop-color="#F8E9B0"/>
        <stop offset="35%" stop-color="#E0C468"/>
        <stop offset="100%" stop-color="#B88622"/>

    </linearGradient>

    <!-- Dark Panel -->

    <linearGradient
        id="panelGradient"
        x1="0%"
        y1="0%"
        x2="0%"
        y2="100%">

        <stop offset="0%" stop-color="#162334"/>
        <stop offset="100%" stop-color="#08111C"/>

    </linearGradient>

    <!-- Engine Glow -->

    <filter
        id="engineGlow"
        x="-50%"
        y="-50%"
        width="200%"
        height="200%">

        <feGaussianBlur
            stdDeviation="12"
            result="blur"/>

        <feMerge>

            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>

        </feMerge>

    </filter>

    <!-- Node Glow -->

    <filter
        id="nodeGlow"
        x="-50%"
        y="-50%"
        width="200%"
        height="200%">

        <feGaussianBlur
            stdDeviation="5"
            result="blur"/>

        <feMerge>

            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>

        </feMerge>

    </filter>

</defs>

<!-- =====================================================
     BACKGROUND
===================================================== -->

<rect
    width="1400"
    height="1400"
    fill="#05080D"/>

<!-- =====================================================
     OUTER VIGNETTE
===================================================== -->

<circle
    cx="700"
    cy="700"
    r="620"
    fill="none"
    stroke="#0D1623"
    stroke-width="2"/>

<circle
    cx="700"
    cy="700"
    r="500"
    fill="none"
    stroke="#101C2C"
    stroke-width="2"/>

<circle
    cx="700"
    cy="700"
    r="380"
    fill="none"
    stroke="#132031"
    stroke-width="2"/>

<!-- =====================================================
     GRID
===================================================== -->

<g
    stroke="#FFFFFF"
    stroke-width="1"
    opacity=".035">

    <!-- Vertical -->

    <line x1="100" y1="0" x2="100" y2="1400"/>
    <line x1="200" y1="0" x2="200" y2="1400"/>
    <line x1="300" y1="0" x2="300" y2="1400"/>
    <line x1="400" y1="0" x2="400" y2="1400"/>
    <line x1="500" y1="0" x2="500" y2="1400"/>
    <line x1="600" y1="0" x2="600" y2="1400"/>
    <line x1="700" y1="0" x2="700" y2="1400"/>
    <line x1="800" y1="0" x2="800" y2="1400"/>
    <line x1="900" y1="0" x2="900" y2="1400"/>
    <line x1="1000" y1="0" x2="1000" y2="1400"/>
    <line x1="1100" y1="0" x2="1100" y2="1400"/>
    <line x1="1200" y1="0" x2="1200" y2="1400"/>
    <line x1="1300" y1="0" x2="1300" y2="1400"/>

    <!-- Horizontal -->

    <line x1="0" y1="100" x2="1400" y2="100"/>
    <line x1="0" y1="200" x2="1400" y2="200"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="400" x2="1400" y2="400"/>
    <line x1="0" y1="500" x2="1400" y2="500"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="0" y1="700" x2="1400" y2="700"/>
    <line x1="0" y1="800" x2="1400" y2="800"/>
    <line x1="0" y1="900" x2="1400" y2="900"/>
    <line x1="0" y1="1000" x2="1400" y2="1000"/>
    <line x1="0" y1="1100" x2="1400" y2="1100"/>
    <line x1="0" y1="1200" x2="1400" y2="1200"/>
    <line x1="0" y1="1300" x2="1400" y2="1300"/>

</g>

<!-- =====================================================
     PART 1 COMPLETE
     Center engine begins in Part 2.
===================================================== -->
<!-- =====================================================
     CENTER VALUE ENGINE
===================================================== -->

<g id="asset-fusion-engine">

    <!-- Outer Halo -->

    <circle
        cx="700"
        cy="700"
        r="150"
        fill="none"
        stroke="url(#goldGradient)"
        stroke-width="3"
        opacity=".30"
        filter="url(#engineGlow)"/>

    <circle
        cx="700"
        cy="700"
        r="125"
        fill="none"
        stroke="url(#goldGradient)"
        stroke-width="2"
        opacity=".55"/>

    <!-- Engine Ring -->

    <circle
        cx="700"
        cy="700"
        r="95"
        fill="url(#panelGradient)"
        stroke="url(#goldGradient)"
        stroke-width="4"/>

    <!-- Core -->

    <circle
        cx="700"
        cy="700"
        r="42"
        fill="url(#goldGradient)"
        opacity=".95"/>

    <!-- Inner Ring -->

    <circle
        cx="700"
        cy="700"
        r="58"
        fill="none"
        stroke="#F6E7A8"
        stroke-width="2"
        opacity=".65"/>

    <!-- Crosshair -->

    <line
        x1="700"
        y1="575"
        x2="700"
        y2="825"
        stroke="#B88622"
        stroke-width="1"
        opacity=".30"/>

    <line
        x1="575"
        y1="700"
        x2="825"
        y2="700"
        stroke="#B88622"
        stroke-width="1"
        opacity=".30"/>

    <!-- Labels -->

    <text
        x="700"
        y="688"
        text-anchor="middle"
        fill="#FFFFFF"
        font-size="18"
        font-family="Inter,Arial,sans-serif"
        font-weight="700">

        ASSET

    </text>

    <text
        x="700"
        y="716"
        text-anchor="middle"
        fill="#FFFFFF"
        font-size="18"
        font-family="Inter,Arial,sans-serif"
        font-weight="700">

        FUSION

    </text>

    <text
        x="700"
        y="848"
        text-anchor="middle"
        fill="#D6B86A"
        font-size="18"
        font-family="Inter,Arial,sans-serif"
        letter-spacing="3">

        VALUE ENGINE

    </text>

</g>
<!-- =====================================================
     PRIMARY ECOSYSTEM NODES
===================================================== -->

<g id="ecosystem-nodes">

    <!-- PAYROLL -->

    <g id="node-payroll">

        <line
