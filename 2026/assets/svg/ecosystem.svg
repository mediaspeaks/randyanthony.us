            stroke-width="2"
            opacity=".45"/>

        <circle
            cx="700"
            cy="250"
            r="44"
            fill="url(#panelGradient)"
            stroke="url(#goldGradient)"
            stroke-width="3"
            filter="url(#nodeGlow)"/>

        <text
