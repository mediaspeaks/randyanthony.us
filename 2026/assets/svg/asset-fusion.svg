<?xml version="1.0" encoding="UTF-8"?>
<!--
=========================================================
 The Piety PayChain
 Asset Fusion
 Version 1.0
=========================================================
-->

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1400"
    height="800"
    viewBox="0 0 1400 800"
    role="img"
    aria-labelledby="title desc">

<title id="title">
The Piety PayChain Asset Fusion
</title>

<desc id="desc">
Illustration showing how multiple financial components
merge into one unified value platform.
</desc>

<defs>

    <linearGradient
        id="gold"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="100%">

        <stop offset="0%" stop-color="#F7E5A7"/>
        <stop offset="45%" stop-color="#DFC062"/>
        <stop offset="100%" stop-color="#B88723"/>

    </linearGradient>

    <linearGradient
        id="panel"
        x1="0%"
        y1="0%"
        x2="0%"
        y2="100%">

        <stop offset="0%" stop-color="#172435"/>
        <stop offset="100%" stop-color="#08111D"/>

    </linearGradient>

    <filter id="glow">

        <feGaussianBlur
            stdDeviation="10"
            result="blur"/>

        <feMerge>

            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>

        </feMerge>

    </filter>

</defs>

<rect
    width="1400"
    height="800"
    fill="#05080D"/>

<!-- =====================================================
     TITLE
===================================================== -->

<text
    x="700"
    y="75"
    text-anchor="middle"
    fill="#F6E7A8"
    font-family="Inter,Arial,sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="4">

ASSET FUSION

</text>

<text
    x="700"
    y="110"
    text-anchor="middle"
    fill="#95A3B4"
    font-family="Inter,Arial,sans-serif"
    font-size="18">

ONE PLATFORM. MULTIPLE PARTICIPANTS.

</text>

<!-- =====================================================
     CENTER PLATFORM
===================================================== -->

<g id="fusion-core">

    <rect
        x="520"
        y="260"
        width="360"
        height="280"
        rx="24"
        fill="url(#panel)"
        stroke="url(#gold)"
        stroke-width="4"
        filter="url(#glow)"/>

    <circle
        cx="700"
        cy="400"
        r="82"
        fill="none"
        stroke="url(#gold)"
        stroke-width="3"/>

    <circle
        cx="700"
        cy="400"
        r="36"
        fill="url(#gold)"/>

    <text
        x="700"
        y="335"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="22"
        font-weight="700">

        ASSET

    </text>

    <text
        x="700"
        y="475"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="22"
        font-weight="700">

        FUSION

    </text>

</g>
<!-- =====================================================
     PARTICIPANT MODULES
===================================================== -->

<g id="participants">

    <!-- PAYROLL -->

    <rect
        x="130"
        y="130"
        width="190"
        height="60"
        rx="10"
        fill="url(#panel)"
        stroke="url(#gold)"
        stroke-width="2"/>

    <text
        x="225"
        y="167"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        PAYROLL

    </text>

    <!-- EMPLOYEES -->

    <rect
        x="130"
        y="305"
        width="190"
        height="60"
        rx="10"
        fill="url(#panel)"
        stroke="url(#gold)"
        stroke-width="2"/>

    <text
        x="225"
        y="342"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        EMPLOYEES

    </text>

    <!-- DIGITAL ASSETS -->

    <rect
        x="130"
        y="480"
        width="190"
        height="60"
        rx="10"
        fill="url(#panel)"
        stroke="url(#gold)"
        stroke-width="2"/>

    <text
        x="225"
        y="517"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="17"
        font-weight="600">

        DIGITAL ASSETS

    </text>

    <!-- PRIVATE LEDGER -->

    <rect
        x="1080"
        y="130"
        width="190"
        height="60"
        rx="10"
        fill="url(#panel)"
        stroke="url(#gold)"
        stroke-width="2"/>

    <text
        x="1175"
        y="167"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="17"
        font-weight="600">

        PRIVATE LEDGER

    </text>

    <!-- MERCHANTS -->

    <rect
        x="1080"
        y="305"
        width="190"
        height="60"
        rx="10"
        fill="url(#panel)"
        stroke="url(#gold)"
        stroke-width="2"/>

    <text
        x="1175"
        y="342"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="18"
        font-weight="600">

        MERCHANTS

    </text>

    <!-- BUSINESSES -->

    <rect
        x="1080"
        y="480"
        width="190"
        height="60"
        rx="10"
        fill="url(#panel)"
        stroke="url(#gold)"
        stroke-width="2"/>

    <text
        x="1175"
        y="517"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="17"
        font-weight="600">

        BUSINESSES

    </text>

</g>

<!-- =====================================================
     CONNECTIONS
===================================================== -->

<g
    stroke="url(#gold)"
    stroke-width="3"
    opacity=".85">

    <line x1="320" y1="160" x2="520" y2="315"/>

    <line x1="320" y1="335" x2="520" y2="400"/>

    <line x1="320" y1="510" x2="520" y2="485"/>

    <line x1="880" y1="315" x2="1080" y2="160"/>

    <line x1="880" y1="400" x2="1080" y2="335"/>

    <line x1="880" y1="485" x2="1080" y2="510"/>

</g>

<!-- =====================================================
     FLOW NODES
===================================================== -->

<g
    fill="url(#gold)"
    opacity=".80">

    <circle cx="430" cy="245" r="4"/>

    <circle cx="430" cy="365" r="4"/>

    <circle cx="430" cy="470" r="4"/>

    <circle cx="970" cy="245" r="4"/>

    <circle cx="970" cy="365" r="4"/>

    <circle cx="970" cy="470" r="4"/>

</g>
<!-- =====================================================
     PLATFORM BENEFITS
===================================================== -->

<g id="platform-benefits">

    <text
        x="700"
        y="610"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Inter,Arial,sans-serif"
        font-size="20"
        font-weight="700"
        letter-spacing="2">

        ONE ECOSYSTEM • MULTIPLE PARTICIPANTS • SHARED VALUE

    </text>

    <text
        x="700"
        y="645"
        text-anchor="middle"
        fill="#AAB7C7"
        font-family="Inter,Arial,sans-serif"
        font-size="15">

        Payroll, Digital Assets, Private Ledger Technology, Businesses,
        Merchants, and Employees operating within one integrated platform.

    </text>

</g>

<!-- =====================================================
     PLATFORM STATUS
===================================================== -->

<g id="platform-status">

    <circle
        cx="170"
        cy="655"
        r="7"
        fill="#2ECC71"/>

    <text
        x="190"
        y="661"
        fill="#C8D2DD"
        font-family="Inter,Arial,sans-serif"
        font-size="14">

        PLATFORM ONLINE

    </text>

    <circle
        cx="170"
        cy="685"
        r="7"
        fill="#3498DB"/>

    <text
        x="190"
        y="691"
        fill="#C8D2DD"
        font-family="Inter,Arial,sans-serif"
        font-size="14">

        PRIVATE LEDGER VERIFIED

    </text>

    <circle
        cx="170"
        cy="715"
        r="7"
        fill="#F1C40F"/>

    <text
        x="190"
        y="721"
        fill="#C8D2DD"
        font-family="Inter,Arial,sans-serif"
        font-size="14">

        ASSET FUSION ACTIVE

    </text>

</g>

<!-- =====================================================
     DECORATIVE GUIDE RINGS
===================================================== -->

<circle
    cx="700"
    cy="400"
    r="165"
    fill="none"
    stroke="#F6E7A8"
    stroke-width="1"
    opacity=".08"/>

<circle
    cx="700"
    cy="400"
    r="190"
    fill="none"
    stroke="#F6E7A8"
    stroke-width="1"
    opacity=".05"/>

<!-- =====================================================
     CORNER REFERENCE MARKS
===================================================== -->

<g
    stroke="#2F4052"
    stroke-width="2"
    opacity=".30">

    <line x1="40" y1="40" x2="90" y2="40"/>
    <line x1="40" y1="40" x2="40" y2="90"/>

    <line x1="1310" y1="40" x2="1360" y2="40"/>
    <line x1="1360" y1="40" x2="1360" y2="90"/>

    <line x1="40" y1="760" x2="90" y2="760"/>
    <line x1="40" y1="710" x2="40" y2="760"/>

    <line x1="1310" y1="760" x2="1360" y2="760"/>
    <line x1="1360" y1="710" x2="1360" y2="760"/>

</g>

<!-- =====================================================
     FOOTER
===================================================== -->

<line

    x1="180"
    y1="760"

    x2="1220"
    y2="760"

    stroke="#223243"

    stroke-width="2"/>

<text

    x="700"
    y="790"

    text-anchor="middle"

    fill="#667789"

    font-family="Inter,Arial,sans-serif"

    font-size="13"

    letter-spacing="2">

THE PIETY PAYCHAIN • ASSET FUSION • VERSION 1.0

</text>
</svg>
